[package]
name = "branchorag" # Changed from branchograph
version = "0.1.0"
edition = "2021"

[lib]
name = "branchorag" # Must match package name
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.20.0", features = ["extension-module"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
walkdir = "2.3" # This is the "Eyes" tool that scans your folders
